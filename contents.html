<script type="text/javascript">
$.fn.slideShow = function(config) {
   var options = $.extend({
      effect  : 'fade',
      loop    : 'repaet',
      timeout : 4000,
      speed   : 4000
   }, config);
   return this.each(function() {
      var current = 0;
      var next = 1;
      var photo = $(this).children();
      $(photo).hide();
      $('img', photo).hide();
      $(photo[0]).show();
      for (i=0; i < photo.length; i++) {
         var src = [];
         src[i] = $('img', photo[i]).attr('src');
         $(photo[i]).css('background-image','url('+src[i]+')');
      }
      photoWidth();
      $(window).resize(function() {
         photoWidth();
      });
      function photoWidth() {
         var windowWidth = $(window).width();
         photo.css('width',545);
      }
      var change = function(){
         if (options.effect == 'fade') {
            $(photo[current]).fadeOut(options.speed);
            $(photo[next]).fadeIn(options.speed);
         } else if  (options.effect == 'slide') {
            $(photo[current]).slideUp(options.speed);
            $(photo[next]).slideDown(options.speed);
         }
         if (options.loop == 'repeat') {
            if ((next + 1) < photo.length) {
                current = next;
                next++;
            } else {
                current = photo.length - 1;
                next = 0;
            }
         }
         if (options.loop == 'stop') {
            if ((next + 1) < photo.length) {
                current = next;
                next++;
            } else {
                return;
            }
         }
      };
      var timer = setInterval(function(){change();}, options.timeout);
   });
};
$(function() {
   $('#slideshow ul').slideShow({effect : 'fade',loop : 'repeat',timeout: 4000,speed : 4000});
});
</script>
